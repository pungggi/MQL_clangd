<svg width="400" height="400" viewBox="0 0 400 400"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="gtGradTerminalDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66f2c2"/>
      <stop offset="40%" stop-color="#136f89"/>
      <stop offset="80%" stop-color="#2ba02b"/>
      <stop offset="100%" stop-color="#f6fff2"/>
    </linearGradient>

    <filter id="glowTerminalDark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glowTerminalDark)" transform="translate(40,40)">
    <polygon
      points="60,60 300,160 60,260"
      fill="url(#gtGradTerminalDark)"
      stroke="#b8ffe9"
      stroke-width="4"
      stroke-linejoin="round"
    />

    <polygon
      points="85,90 260,160 85,230"
      fill="rgba(0,0,0,0.3)"
      stroke="rgba(220,255,245,0.5)"
      stroke-width="1.5"
    />

    <polyline
      points="70,70 240,140"
      fill="none"
      stroke="rgba(255,255,255,0.8)"
      stroke-width="2"
      stroke-linecap="round"
    />
    <polyline
      points="80,250 250,180"
      fill="none"
      stroke="rgba(180,255,210,0.75)"
      stroke-width="2"
      stroke-linecap="round"
    />
  </g>
</svg>